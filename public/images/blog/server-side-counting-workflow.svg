<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <!-- Client Side -->
  <rect x="40" y="100" width="180" height="240" rx="16" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="130" y="130" fill="#94A3B8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">USER BROWSER</text>
  <rect x="70" y="150" width="120" height="40" rx="8" fill="#334155"/>
  <text x="130" y="175" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">1. TYPES PROMPT</text>

  <!-- The "Internet" Gap -->
  <path d="M220 170H320" stroke="#475569" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrowhead)"/>
  <text x="270" y="160" fill="#64748B" font-family="sans-serif" font-size="9" text-anchor="middle">NETWORK LATENCY</text>
  <path d="M320 230H220" stroke="#475569" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrowhead)"/>
  <text x="270" y="250" fill="#64748B" font-family="sans-serif" font-size="9" text-anchor="middle">RESPONSE DELAY</text>

  <!-- Server Side -->
  <rect x="320" y="80" width="440" height="280" rx="16" fill="#7F1D1D" fill-opacity="0.1" stroke="#EF4444" stroke-width="2"/>
  <text x="540" y="110" fill="#EF4444" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">SERVER / PROXY SIDE</text>
  
  <!-- Server Steps -->
  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="180" height="120" rx="12" fill="#1E1B4B" stroke="#4338CA"/>
    <text x="90" y="30" fill="white" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2. DATA TRANSMISSION</text>
    <text x="90" y="55" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">Sensitive prompt data</text>
    <text x="90" y="70" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">leaves the browser.</text>
    <path d="M70 90H110" stroke="#EF4444" stroke-width="2"/>
    <text x="90" y="110" fill="#EF4444" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">PRIVACY RISK</text>
  </g>

  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#1E1B4B" stroke="#4338CA"/>
    <text x="100" y="30" fill="white" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3. TOKENIZATION ENGINE</text>
    <text x="100" y="55" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">Tiktoken runs on server.</text>
    <text x="100" y="75" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">Results computed</text>
    <text x="100" y="90" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">then sent back.</text>
  </g>

  <path d="M520 200H540" stroke="#4338CA" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Labels & Callouts -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">THE SERVER-SIDE LATENCY LOOP</text>
  <rect x="40" y="65" width="100" height="4" rx="2" fill="#EF4444"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="360" width="720" height="30" rx="8" fill="#F87171" fill-opacity="0.1"/>
  <text x="60" y="380" fill="#F87171" font-family="sans-serif" font-size="11" font-weight="bold">TRADITIONAL DRAWBACKS: High Network Latency + Exposure of Private Content to Servers.</text>
</svg>