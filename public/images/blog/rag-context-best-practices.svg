<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="28" font-weight="black">RAG CONTEXT MANAGEMENT BEST PRACTICES</text>
  <rect x="40" y="65" width="200" height="4" rx="2" fill="#6366F1"/>

  <!-- Grid of Practices -->
  
  <!-- 1. Intelligent Chunking -->
  <g transform="translate(40, 100)">
    <rect width="350" height="220" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="#6366F1" fill-opacity="0.2"/>
    <path d="M30 30H50V50H30V30Z" fill="#6366F1" fill-opacity="0.5"/>
    <text x="75" y="45" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">1. INTELLIGENT CHUNKING</text>
    <ul font-family="sans-serif" font-size="14" fill="#94A3B8">
      <text x="25" y="90" fill="#CBD5E1">• Use Semantic Boundaries (Paragraphs)</text>
      <text x="25" y="120" fill="#CBD5E1">• Implement 10-20% Context Overlap</text>
      <text x="25" y="150" fill="#CBD5E1">• Attach Rich Metadata to Chunks</text>
      <text x="25" y="180" fill="#6366F1" font-weight="bold" font-size="12">GOAL: Maintain Information Coherence</text>
    </ul>
  </g>

  <!-- 2. Advanced Retrieval -->
  <g transform="translate(410, 100)">
    <rect width="350" height="220" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="#10B981" fill-opacity="0.2"/>
    <path d="M30 40L40 30L50 40" stroke="#10B981" stroke-width="2"/>
    <text x="75" y="45" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">2. ADVANCED RETRIEVAL</text>
    <ul font-family="sans-serif" font-size="14" fill="#94A3B8">
      <text x="25" y="90" fill="#CBD5E1">• Re-ranking for Top Relevance</text>
      <text x="25" y="120" fill="#CBD5E1">• Hybrid Search (Vector + Keyword)</text>
      <text x="25" y="150" fill="#CBD5E1">• Contextual Compression (Summarize)</text>
      <text x="25" y="180" fill="#10B981" font-weight="bold" font-size="12">GOAL: Quality Over Quantity</text>
    </ul>
  </g>

  <!-- 3. Dynamic Adjustment -->
  <g transform="translate(40, 340)">
    <rect width="350" height="220" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="#F59E0B" fill-opacity="0.2"/>
    <path d="M30 40C35 30 45 30 50 40" stroke="#F59E0B" stroke-width="2"/>
    <text x="75" y="45" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">3. DYNAMIC ADJUSTMENT</text>
    <ul font-family="sans-serif" font-size="14" fill="#94A3B8">
      <text x="25" y="90" fill="#CBD5E1">• Query Expansion (Synonyms)</text>
      <text x="25" y="120" fill="#CBD5E1">• Adjust "K" based on Complexity</text>
      <text x="25" y="150" fill="#CBD5E1">• Feedback Loops for Re-retrieval</text>
      <text x="25" y="180" fill="#F59E0B" font-weight="bold" font-size="12">GOAL: Adaptive Token Usage</text>
    </ul>
  </g>

  <!-- 4. Prompt Engineering -->
  <g transform="translate(410, 340)">
    <rect width="350" height="220" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="#EF4444" fill-opacity="0.2"/>
    <path d="M35 35L45 45M45 35L35 45" stroke="#EF4444" stroke-width="2"/>
    <text x="75" y="45" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">4. PROMPT STRATEGY</text>
    <ul font-family="sans-serif" font-size="14" fill="#94A3B8">
      <text x="25" y="90" fill="#CBD5E1">• Clear Exclusion Instructions</text>
      <text x="25" y="120" fill="#CBD5E1">• Position Key Data at Start/End</text>
      <text x="25" y="150" fill="#CBD5E1">• Concise User Queries</text>
      <text x="25" y="180" fill="#EF4444" font-weight="bold" font-size="12">GOAL: Efficient Context Utilization</text>
    </ul>
  </g>

  <!-- Central "TokenSense" Badge -->
  <circle cx="400" cy="310" r="50" fill="#0F172A" stroke="#6366F1" stroke-width="4"/>
  <text x="400" y="305" fill="white" font-family="sans-serif" font-size="10" font-weight="black" text-anchor="middle">OPTIMIZE</text>
  <text x="400" y="325" fill="#818CF8" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">WITH TOKENSENSE</text>
</svg>