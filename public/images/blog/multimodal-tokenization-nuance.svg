<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" rx="24" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">MULTIMODAL TOKENIZATION PIPELINE</text>
  <text x="40" y="75" fill="#94A3B8" font-family="sans-serif" font-size="14">How raw data becomes expensive API tokens</text>
  <rect x="40" y="85" width="120" height="4" rx="2" fill="#6366F1"/>

  <!-- Input Side -->
  <g transform="translate(60, 140)">
    <text x="0" y="-20" fill="#6366F1" font-family="sans-serif" font-size="12" font-weight="bold">RAW INPUT</text>
    
    <!-- Image Icon -->
    <rect x="0" y="0" width="80" height="60" rx="8" fill="#1E293B" stroke="#334155"/>
    <path d="M20 40L35 25L50 40M45 35L55 25L65 35" stroke="#6366F1" stroke-width="2"/>
    <text x="40" y="75" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">IMAGE</text>

    <!-- Video Icon -->
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="80" height="60" rx="8" fill="#1E293B" stroke="#334155"/>
      <path d="M25 20V40L55 30L25 20Z" fill="#6366F1" fill-opacity="0.3" stroke="#6366F1" stroke-width="2"/>
      <text x="40" y="75" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">VIDEO</text>
    </g>

    <!-- Audio Icon -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="80" height="60" rx="8" fill="#1E293B" stroke="#334155"/>
      <path d="M20 30H30M35 20V40M45 15V45M55 25V35M60 30H65" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="75" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">AUDIO</text>
    </g>
  </g>

  <!-- Processing Center -->
  <g transform="translate(250, 140)">
    <text x="100" y="-20" fill="#10B981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">THE "NUANCE" (PROCESSING)</text>
    <rect x="0" y="0" width="200" height="260" rx="20" fill="#064E3B" fill-opacity="0.2" stroke="#10B981" stroke-width="2" stroke-dasharray="8 4"/>
    
    <!-- Strategy A: Tiling -->
    <g transform="translate(20, 30)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="#10B981" fill-opacity="0.2" stroke="#10B981"/>
      <path d="M20 0V40M0 20H40" stroke="#10B981" stroke-width="1"/>
      <text x="50" y="15" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">GPT-4o TILING</text>
      <text x="50" y="30" fill="#4ade80" font-family="sans-serif" font-size="9">Fixed 512px Patches</text>
    </g>

    <!-- Strategy B: Sampling -->
    <g transform="translate(20, 100)">
      <circle cx="20" cy="20" r="20" fill="#10B981" fill-opacity="0.2" stroke="#10B981"/>
      <path d="M20 10V30M10 20H30" stroke="#10B981" stroke-width="2"/>
      <text x="50" y="15" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">GEMINI SAMPLING</text>
      <text x="50" y="30" fill="#4ade80" font-family="sans-serif" font-size="9">FPS-based Tokenization</text>
    </g>

    <!-- Strategy C: Encoding -->
    <g transform="translate(20, 170)">
      <rect x="0" y="0" width="40" height="40" rx="4" fill="#10B981" fill-opacity="0.2" stroke="#10B981"/>
      <path d="M8 12H32M8 20H32M8 28H24" stroke="#10B981" stroke-width="2"/>
      <text x="50" y="15" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">CLAUDE MP LIMITS</text>
      <text x="50" y="30" fill="#4ade80" font-family="sans-serif" font-size="9">Variable Res Scaling</text>
    </g>
  </g>

  <!-- Output Tokens -->
  <g transform="translate(560, 140)">
    <text x="120" y="-20" fill="#F59E0B" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="end">FINAL TOKEN COUNT</text>
    
    <g transform="translate(40, 20)">
      <rect x="0" y="0" width="100" height="20" rx="4" fill="#F59E0B"/>
      <rect x="0" y="30" width="140" height="20" rx="4" fill="#F59E0B" fill-opacity="0.7"/>
      <rect x="0" y="60" width="80" height="20" rx="4" fill="#F59E0B" fill-opacity="0.4"/>
      <text x="0" y="110" fill="#D97706" font-family="sans-serif" font-size="14" font-weight="black">NON-LINEAR COSTS</text>
    </g>
  </g>

  <!-- Connecting Arrows -->
  <path d="M150 270H240" stroke="#334155" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M460 270H550" stroke="#334155" stroke-width="3" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <!-- Callout -->
  <rect x="40" y="420" width="720" height="50" rx="12" fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="1"/>
  <text x="70" y="450" fill="#FBBF24" font-family="sans-serif" font-size="12" font-weight="bold">The Hidden Multiplier: One image can equal 85 tokens OR 2,000+ tokens depending on the model's strategy.</text>
</svg>