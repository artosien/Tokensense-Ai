<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0F172A"/>
  
  <!-- Water Line -->
  <rect y="220" width="800" height="380" fill="#1E293B" fill-opacity="0.5"/>
  <line x1="0" y1="220" x2="800" y2="220" stroke="#38BDF8" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- Iceberg Tip (Input) -->
  <path d="M400 60L460 220H340L400 60Z" fill="url(#tipGradient)" stroke="#7DD3FC" stroke-width="2"/>
  
  <!-- Iceberg Base (Output) -->
  <path d="M340 220L250 450L400 540L550 450L460 220H340Z" fill="url(#baseGradient)" stroke="#0EA5E9" stroke-width="3"/>

  <!-- Labels -->
  <text x="470" y="140" fill="#7DD3FC" font-family="sans-serif" font-size="18" font-weight="bold">INPUT TOKENS</text>
  <text x="470" y="160" fill="#94A3B8" font-family="sans-serif" font-size="12">The visible prompt cost</text>

  <text x="560" y="380" fill="#0EA5E9" font-family="sans-serif" font-size="24" font-weight="black">OUTPUT TOKENS</text>
  <text x="560" y="410" fill="#38BDF8" font-family="sans-serif" font-size="16" font-weight="bold">3x - 5x MORE EXPENSIVE</text>
  <text x="560" y="435" fill="#94A3B8" font-family="sans-serif" font-size="14">The hidden bill driver</text>

  <!-- Annotations -->
  <circle cx="400" cy="140" r="4" fill="#7DD3FC"/>
  <path d="M400 140H460" stroke="#7DD3FC" stroke-width="1" stroke-dasharray="2 2"/>

  <circle cx="450" cy="400" r="6" fill="#0EA5E9"/>
  <path d="M450 400H550" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="tipGradient" x1="400" y1="60" x2="400" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="baseGradient" x1="400" y1="220" x2="400" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="28" font-weight="black">THE LLM COST ICEBERG</text>
  <rect x="40" y="65" width="120" height="4" fill="#38BDF8"/>
</svg>