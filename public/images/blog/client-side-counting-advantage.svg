<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <!-- Client Side -->
  <rect x="40" y="80" width="720" height="280" rx="16" fill="#064E3B" fill-opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="110" fill="#10B981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">CLIENT-SIDE PROCESSING (TOKENSENSE-AI)</text>

  <!-- Flow -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" width="180" height="100" rx="12" fill="#1E293B" stroke="#334155"/>
    <text x="90" y="30" fill="white" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">1. PROMPT ENTRY</text>
    <text x="90" y="55" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">User types data</text>
    <text x="90" y="70" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">into the browser.</text>
  </g>

  <path d="M260 200H310" stroke="#10B981" stroke-width="2" marker-end="url(#arrowheadGreen)"/>

  <g transform="translate(310, 150)">
    <rect x="0" y="0" width="180" height="100" rx="12" fill="#065F46" stroke="#059669"/>
    <text x="90" y="30" fill="white" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2. LOCAL WASM Tiktoken</text>
    <text x="90" y="55" fill="#A7F3D0" font-family="sans-serif" font-size="9" text-anchor="middle">Processing happens</text>
    <text x="90" y="70" fill="#A7F3D0" font-family="sans-serif" font-size="9" text-anchor="middle">on the user's CPU.</text>
    <path d="M70 80H110" stroke="#10B981" stroke-width="2"/>
    <text x="90" y="95" fill="#10B981" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">ZERO DATA LEAK</text>
  </g>

  <path d="M490 200H540" stroke="#10B981" stroke-width="2" marker-end="url(#arrowheadGreen)"/>

  <g transform="translate(540, 150)">
    <rect x="0" y="0" width="180" height="100" rx="12" fill="#1E293B" stroke="#334155"/>
    <text x="90" y="30" fill="white" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3. INSTANT RESULT</text>
    <text x="90" y="55" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">Zero millisecond</text>
    <text x="90" y="70" fill="#94A3B8" font-family="sans-serif" font-size="9" text-anchor="middle">network wait.</text>
  </g>

  <!-- Labels -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">THE CLIENT-SIDE ADVANTAGE</text>
  <rect x="40" y="65" width="100" height="4" rx="2" fill="#10B981"/>

  <defs>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="360" width="720" height="30" rx="8" fill="#10B981" fill-opacity="0.1"/>
  <text x="60" y="380" fill="#10B981" font-family="sans-serif" font-size="11" font-weight="bold">BENEFITS: 0ms Network Latency + Total Privacy (Data never leaves your machine).</text>
</svg>