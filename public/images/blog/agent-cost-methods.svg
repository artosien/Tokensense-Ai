<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="28" font-weight="black">AGENT COST CALCULATION METHODS</text>
  <rect x="40" y="65" width="160" height="4" rx="2" fill="#6366F1"/>

  <!-- Manual Method Section -->
  <rect x="40" y="100" width="350" height="460" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="60" y="140" fill="#94A3B8" font-family="sans-serif" font-size="18" font-weight="bold">MANUAL ESTIMATION</text>
  
  <!-- Manual Steps -->
  <g transform="translate(60, 170)">
    <circle cx="15" cy="15" r="15" fill="#334155"/>
    <text x="15" y="20" fill="#94A3B8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">1</text>
    <text x="45" y="20" fill="#CBD5E1" font-family="sans-serif" font-size="14">Map expected workflow</text>
    
    <g transform="translate(0, 50)">
      <circle cx="15" cy="15" r="15" fill="#334155"/>
      <text x="15" y="20" fill="#94A3B8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">2</text>
      <text x="45" y="20" fill="#CBD5E1" font-family="sans-serif" font-size="14">Count base &amp; incremental tokens</text>
    </g>

    <g transform="translate(0, 100)">
      <circle cx="15" cy="15" r="15" fill="#334155"/>
      <text x="15" y="20" fill="#94A3B8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">3</text>
      <text x="45" y="20" fill="#CBD5E1" font-family="sans-serif" font-size="14">Apply quadratic growth formula</text>
      <rect x="45" y="30" width="220" height="40" rx="8" fill="#0F172A" stroke="#334155"/>
      <text x="55" y="55" fill="#6366F1" font-family="monospace" font-size="10">Total = (B*T) + (I*(T*(T-1))/2)</text>
    </g>

    <g transform="translate(0, 180)">
      <circle cx="15" cy="15" r="15" fill="#334155"/>
      <text x="15" y="20" fill="#94A3B8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">4</text>
      <text x="45" y="20" fill="#CBD5E1" font-family="sans-serif" font-size="14">Lookup current model pricing</text>
    </g>

    <g transform="translate(0, 230)">
      <circle cx="15" cy="15" r="15" fill="#334155"/>
      <text x="15" y="20" fill="#94A3B8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">5</text>
      <text x="45" y="20" fill="#CBD5E1" font-family="sans-serif" font-size="14">Manual Excel/Calculator math</text>
    </g>
  </g>

  <!-- TokenSense Section -->
  <rect x="410" y="100" width="350" height="460" rx="20" fill="#312E81" fill-opacity="0.3" stroke="#6366F1" stroke-width="2"/>
  <text x="430" y="140" fill="#818CF8" font-family="sans-serif" font-size="18" font-weight="bold">TOKENSENSE-AI METHOD</text>

  <!-- TokenSense Steps -->
  <g transform="translate(430, 170)">
    <rect x="0" y="0" width="310" height="60" rx="12" fill="#1E1B4B" stroke="#4338CA"/>
    <text x="50" y="35" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">1. PASTE PROMPT &amp; GOAL</text>
    <path d="M15 15H35V45H15V15Z" fill="#6366F1" fill-opacity="0.2"/>
    
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="310" height="60" rx="12" fill="#1E1B4B" stroke="#4338CA"/>
      <text x="50" y="35" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">2. CONFIGURE LOOP (TURNS)</text>
    </g>

    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="310" height="60" rx="12" fill="#1E1B4B" stroke="#4338CA"/>
      <text x="50" y="35" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">3. ESTIMATE INCREMENTAL GROWTH</text>
    </g>

    <g transform="translate(0, 250)">
      <rect x="0" y="20" width="310" height="100" rx="15" fill="url(#resultGradient)"/>
      <text x="155" y="65" fill="white" font-family="sans-serif" font-size="18" font-weight="black" text-anchor="middle">INSTANT COST PROJECTION</text>
      <text x="155" y="90" fill="#A5B4FC" font-family="sans-serif" font-size="12" text-anchor="middle">Precise. Compound. Dynamic.</text>
    </g>
  </g>

  <!-- Arrows -->
  <path d="M395 330H405" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <defs>
    <linearGradient id="resultGradient" x1="0" y1="20" x2="310" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1" />
    </marker>
  </defs>
</svg>