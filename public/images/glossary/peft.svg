<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">PEFT (EFFICIENT TUNING)</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#10B981"/>

  <!-- Base Weights -->
  <g transform="translate(60, 100)">
    <rect width="300" height="220" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="150" y="30" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FROZEN BASE WEIGHTS (99%)</text>
    <rect x="20" y="50" width="260" height="150" rx="8" fill="#334155" fill-opacity="0.5"/>
    <path d="M50 80H250M50 110H250M50 140H250" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <text x="150" y="180" fill="#64748B" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">LOCKED</text>
  </g>

  <!-- Adapter -->
  <g transform="translate(420, 100)">
    <rect width="320" height="220" rx="16" fill="#064E3B" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    <text x="160" y="30" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">TRAINABLE ADAPTER (&lt;1%)</text>
    
    <!-- Stylized Matrix -->
    <g transform="translate(130, 80)">
        <rect width="60" height="80" rx="4" fill="#10B981" fill-opacity="0.3" stroke="#10B981"/>
        <path d="M10 20H50M10 40H50M10 60H50" stroke="#10B981" stroke-width="2"/>
        <text x="30" y="110" fill="#10B981" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">LoRA / ADAPTER</text>
    </g>

    <text x="160" y="180" fill="#A7F3D0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">SMART PLUG-IN</text>
    <text x="160" y="200" fill="#4ADE80" font-family="sans-serif" font-size="9" text-anchor="middle">Tiny memory footprint</text>
  </g>

  <!-- Connection -->
  <path d="M360 210H420" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Updating only a fraction of parameters to achieve full fine-tuning quality at 1/100th the cost.</text>
</svg>