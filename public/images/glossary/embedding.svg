<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">VECTOR EMBEDDING</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#10B981"/>

  <!-- The Vector Space -->
  <g transform="translate(100, 100)">
    <!-- Grid -->
    <path d="M0 200V0H300" stroke="#334155" stroke-width="2"/>
    <path d="M0 200L100 100" stroke="#334155" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="310" y="5" fill="#475569" font-family="sans-serif" font-size="10">DIMENSION X</text>
    <text x="-60" y="215" fill="#475569" font-family="sans-serif" font-size="10">DIMENSION Y</text>

    <!-- Concepts -->
    <g transform="translate(240, 40)">
        <circle cx="0" cy="0" r="8" fill="#10B981"/>
        <text x="15" y="5" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">KING</text>
        <text x="15" y="20" fill="#10B981" font-family="sans-serif" font-size="10">[0.98, 0.45, ...]</text>
    </g>

    <g transform="translate(220, 80)">
        <circle cx="0" cy="0" r="8" fill="#10B981"/>
        <text x="15" y="5" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">QUEEN</text>
        <text x="15" y="20" fill="#10B981" font-family="sans-serif" font-size="10">[0.95, 0.42, ...]</text>
        <path d="M-20 -40L0 0" stroke="#10B981" stroke-width="1" stroke-dasharray="2 2"/>
        <text x="-40" y="-15" fill="#10B981" font-family="sans-serif" font-size="8" transform="rotate(-65 -40 -15)">SIMILAR</text>
    </g>

    <g transform="translate(50, 160)">
        <circle cx="0" cy="0" r="8" fill="#F43F5E"/>
        <text x="15" y="5" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">APPLE</text>
        <text x="15" y="20" fill="#F43F5E" font-family="sans-serif" font-size="10">[-0.12, 0.88, ...]</text>
    </g>

    <!-- Connector to Apple (Distant) -->
    <path d="M220 80L50 160" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="100" y="115" fill="#475569" font-family="sans-serif" font-size="8">DISSIMILAR</text>
  </g>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Numerical representations where semantic meaning is captured as geometric distance in high-dimensional space.</text>
</svg>