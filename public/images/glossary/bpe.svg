<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">BYTE PAIR ENCODING (BPE)</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#38BDF8"/>

  <!-- Process -->
  <g transform="translate(100, 150)">
    <!-- Stage 1 -->
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#334155"/>
    <text x="60" y="35" fill="white" font-family="monospace" font-size="14" text-anchor="middle">"low"</text>
    <text x="60" y="80" fill="#64748B" font-family="sans-serif" font-size="10" text-anchor="middle">CHARACTERS</text>

    <!-- Arrow -->
    <path d="M130 30H170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Stage 2 -->
    <g transform="translate(180, 0)">
        <rect width="140" height="60" rx="8" fill="#1E293B" stroke="#38BDF8"/>
        <text x="70" y="35" fill="white" font-family="monospace" font-size="14" text-anchor="middle">"l" "o" "w"</text>
        <text x="70" y="80" fill="#38BDF8" font-family="sans-serif" font-size="10" text-anchor="middle">ITERATIVE MERGING</text>
    </g>

    <!-- Arrow -->
    <path d="M330 30H370" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Stage 3 -->
    <g transform="translate(380, 0)">
        <rect width="160" height="60" rx="8" fill="#0369A1" stroke="#38BDF8"/>
        <text x="80" y="35" fill="white" font-family="monospace" font-size="14" text-anchor="middle">[id: 4291]</text>
        <text x="80" y="80" fill="#38BDF8" font-family="sans-serif" font-size="10" text-anchor="middle">SUBWORD TOKEN</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Efficiently compresses text into numerical IDs by merging frequent character pairs.</text>
</svg>