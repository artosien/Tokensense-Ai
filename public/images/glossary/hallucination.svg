<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">AI HALLUCINATION</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#F87171"/>

  <!-- Source Truth -->
  <g transform="translate(80, 120)">
    <rect width="200" height="150" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="100" y="30" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FACTUAL REALITY</text>
    <path d="M40 70H160M40 100H160" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <rect x="130" y="60" width="20" height="20" rx="4" fill="#10B981" fill-opacity="0.3"/>
  </g>

  <!-- The "Lens" (LLM) -->
  <g transform="translate(340, 120)">
    <path d="M0 75L120 75" stroke="#F87171" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="60" cy="75" r="40" fill="#F87171" fill-opacity="0.1" stroke="#F87171" stroke-width="2"/>
    <text x="60" y="130" fill="#F87171" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">PROBABILISTIC ENGINE</text>
  </g>

  <!-- The Result -->
  <g transform="translate(520, 120)">
    <rect width="200" height="150" rx="16" fill="#450a0a" fill-opacity="0.2" stroke="#F87171" stroke-width="2"/>
    <text x="100" y="30" fill="#F87171" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">CONFIDENT FABRICATION</text>
    <path d="M40 70H160M40 100H120" stroke="#F87171" stroke-width="3" stroke-linecap="round"/>
    <rect x="130" y="90" width="40" height="20" rx="4" fill="#F87171" fill-opacity="0.5"/>
    <text x="150" y="105" fill="white" font-family="sans-serif" font-size="8" font-weight="black" text-anchor="middle">FAKE</text>
  </g>

  <text x="400" y="340" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">When a model prioritizes sequence probability over factual accuracy,</text>
  <text x="400" y="365" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">producing plausible but incorrect information.</text>
</svg>