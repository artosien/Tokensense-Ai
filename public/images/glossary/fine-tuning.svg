<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">MODEL FINE-TUNING</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#A855F7"/>

  <!-- Pre-trained -->
  <g transform="translate(60, 120)">
    <rect width="220" height="180" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="110" y="30" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">PRE-TRAINED BASE</text>
    <circle cx="110" cy="90" r="40" fill="#334155"/>
    <text x="110" y="95" fill="#64748B" font-family="sans-serif" font-size="12" font-weight="black" text-anchor="middle">GENERAL</text>
    <text x="110" y="150" fill="#475569" font-family="sans-serif" font-size="9" text-anchor="middle">Knows a bit of everything</text>
  </g>

  <!-- Training Data -->
  <g transform="translate(320, 140)">
    <path d="M0 40H60M0 60H60M0 80H40" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="110" fill="#A855F7" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">NICHE DATA</text>
  </g>

  <!-- Arrow -->
  <path d="M400 210H460" stroke="#A855F7" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrowPurple)"/>

  <!-- Fine-Tuned -->
  <g transform="translate(500, 120)">
    <rect width="240" height="180" rx="16" fill="#581C87" fill-opacity="0.2" stroke="#A855F7" stroke-width="2"/>
    <text x="120" y="30" fill="#A855F7" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FINE-TUNED SPECIALIST</text>
    <circle cx="120" cy="90" r="40" fill="#A855F7" fill-opacity="0.3" stroke="#A855F7" stroke-width="2"/>
    <text x="120" y="95" fill="white" font-family="sans-serif" font-size="12" font-weight="black" text-anchor="middle">EXPERT</text>
    <text x="120" y="150" fill="#D8B4FE" font-family="sans-serif" font-size="9" text-anchor="middle">Adapted for specific tasks</text>
  </g>

  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A855F7" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Adapting a general model to a specific domain by continuing training on curated data.</text>
</svg>