<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">AI AGENT LOOP</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#6366F1"/>

  <!-- The Loop -->
  <g transform="translate(400, 220)">
    <circle cx="0" cy="0" r="120" stroke="#334155" stroke-width="2" stroke-dasharray="10 5"/>
    
    <!-- Step 1: Perceive -->
    <g transform="translate(0, -120)">
        <circle cx="0" cy="0" r="30" fill="#6366F1"/>
        <text x="0" y="5" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">PERCEIVE</text>
    </g>

    <!-- Step 2: Reason -->
    <g transform="translate(120, 0)">
        <circle cx="0" cy="0" r="30" fill="#8B5CF6"/>
        <text x="0" y="5" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">REASON</text>
    </g>

    <!-- Step 3: Act -->
    <g transform="translate(0, 120)">
        <circle cx="0" cy="0" r="30" fill="#EC4899"/>
        <text x="0" y="5" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">ACT</text>
    </g>

    <!-- Step 4: Observe -->
    <g transform="translate(-120, 0)">
        <circle cx="0" cy="0" r="30" fill="#10B981"/>
        <text x="0" y="5" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">OBSERVE</text>
    </g>

    <!-- Center: LLM Core -->
    <circle cx="0" cy="0" r="50" fill="#1E293B" stroke="#6366F1" stroke-width="3"/>
    <text x="0" y="5" fill="white" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">LLM</text>
  </g>

  <!-- External Tools -->
  <g transform="translate(620, 220)">
    <rect x="0" y="-80" width="100" height="160" rx="12" fill="#1E293B" stroke="#EC4899" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="50" y="0" fill="#EC4899" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">TOOLS / APIs</text>
  </g>
  <path d="M435 220H610" stroke="#EC4899" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowheadPink)"/>

  <defs>
    <marker id="arrowheadPink" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899" />
    </marker>
  </defs>

  <text x="400" y="380" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">An autonomous loop of reasoning and action, utilizing tools to complete multi-step goals.</text>
</svg>