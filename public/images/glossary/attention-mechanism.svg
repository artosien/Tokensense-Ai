<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">ATTENTION MECHANISM</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#8B5CF6"/>

  <!-- The Concept -->
  <g transform="translate(100, 150)">
    <!-- Main Token -->
    <rect x="250" y="100" width="100" height="40" rx="8" fill="#8B5CF6"/>
    <text x="300" y="125" fill="white" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">TARGET TOKEN</text>

    <!-- Context Tokens -->
    <g transform="translate(0, 0)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#334155"/>
        <text x="40" y="20" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">Token A</text>
        <path d="M80 15L250 110" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
    </g>

    <g transform="translate(150, -30)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#334155"/>
        <text x="40" y="20" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">Token B</text>
        <path d="M40 30L260 100" stroke="#8B5CF6" stroke-width="4" opacity="0.8"/>
        <text x="130" y="50" fill="#8B5CF6" font-family="sans-serif" font-size="10" font-weight="bold">HIGH WEIGHT</text>
    </g>

    <g transform="translate(450, 20)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#334155"/>
        <text x="40" y="20" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">Token C</text>
        <path d="M0 15L250 120" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    </g>

    <g transform="translate(550, 120)">
        <rect x="0" y="0" width="80" height="30" rx="4" fill="#334155"/>
        <text x="40" y="20" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">Token D</text>
        <path d="M0 15L350 120" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
    </g>
  </g>

  <!-- Formula Callout -->
  <rect x="520" y="280" width="240" height="80" rx="16" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
  <text x="640" y="310" fill="#8B5CF6" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">KEY FORMULA</text>
  <text x="640" y="340" fill="white" font-family="serif" font-size="16" font-style="italic" text-anchor="middle">Softmax(QKᵀ / √d)V</text>

  <text x="400" y="380" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Allows the model to focus on the most relevant parts of the input, regardless of distance.</text>
</svg>