<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">FEW-SHOT LEARNING</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#F43F5E"/>

  <g transform="translate(60, 100)">
    <!-- Shots -->
    <rect x="0" y="0" width="300" height="220" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="20" y="30" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold">IN-CONTEXT EXAMPLES (SHOTS)</text>
    
    <g transform="translate(20, 50)">
        <rect width="260" height="40" rx="6" fill="#F43F5E" fill-opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
        <text x="10" y="25" fill="white" font-family="monospace" font-size="10">Ex 1: [Input] -> [Output]</text>
    </g>

    <g transform="translate(20, 100)">
        <rect width="260" height="40" rx="6" fill="#F43F5E" fill-opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
        <text x="10" y="25" fill="white" font-family="monospace" font-size="10">Ex 2: [Input] -> [Output]</text>
    </g>

    <g transform="translate(20, 150)">
        <rect width="260" height="40" rx="6" fill="#F43F5E" fill-opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
        <text x="10" y="25" fill="white" font-family="monospace" font-size="10">Ex 3: [Input] -> [Output]</text>
    </g>
  </g>

  <!-- Arrow -->
  <path d="M380 210H450" stroke="#F43F5E" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrowRed)"/>

  <!-- Result -->
  <g transform="translate(480, 100)">
    <rect width="260" height="220" rx="16" fill="#064E3B" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    <text x="20" y="30" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold">NEW INPUT (ZERO COST)</text>
    <rect x="20" y="60" width="220" height="40" rx="6" fill="#1E293B" stroke="#334155"/>
    <text x="30" y="85" fill="white" font-family="monospace" font-size="10">New Query...</text>
    
    <path d="M130 110V140" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <rect x="20" y="160" width="220" height="40" rx="6" fill="#10B981" fill-opacity="0.3" stroke="#10B981"/>
    <text x="30" y="185" fill="white" font-family="monospace" font-size="10" font-weight="bold">Predicted Output ✓</text>
  </g>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Learning a pattern from a few examples in the prompt without updating model weights.</text>
</svg>