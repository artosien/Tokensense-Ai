<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">TRANSFORMER ARCHITECTURE</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#6366F1"/>

  <!-- Parallel Input -->
  <g transform="translate(60, 150)">
    <rect width="100" height="30" rx="4" fill="#1E293B" stroke="#334155"/>
    <rect y="40" width="100" height="30" rx="4" fill="#1E293B" stroke="#334155"/>
    <rect y="80" width="100" height="30" rx="4" fill="#1E293B" stroke="#334155"/>
    <text x="50" y="130" fill="#64748B" font-family="sans-serif" font-size="10" text-anchor="middle">PARALLEL INPUT</text>
  </g>

  <!-- Encoder/Decoder Stack -->
  <g transform="translate(250, 100)">
    <rect width="300" height="200" rx="20" fill="#312E81" fill-opacity="0.2" stroke="#6366F1" stroke-width="2"/>
    <text x="150" y="30" fill="#818CF8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">TRANSFORMER BLOCK</text>
    
    <!-- Layers -->
    <rect x="30" y="50" width="240" height="40" rx="8" fill="#1E1B4B" stroke="#4338CA"/>
    <text x="150" y="75" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">MULTI-HEAD ATTENTION</text>
    
    <path d="M150 90V110" stroke="#6366F1" stroke-width="2"/>

    <rect x="30" y="110" width="240" height="40" rx="8" fill="#1E1B4B" stroke="#4338CA"/>
    <text x="150" y="135" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FEED FORWARD NETWORK</text>
  </g>

  <!-- Output -->
  <g transform="translate(640, 150)">
    <rect width="100" height="110" rx="12" fill="#064E3B" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    <text x="50" y="130" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">PREDICTION</text>
    <path d="M30 40H70M30 60H70M30 80H50" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Flow -->
  <path d="M165 200H240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M555 200H630" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">The engine of modern AI, using self-attention to process entire sequences simultaneously.</text>
</svg>