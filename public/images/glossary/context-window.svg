<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">CONTEXT WINDOW</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#F59E0B"/>

  <!-- The Window -->
  <g transform="translate(100, 100)">
    <!-- Outside / Overflow -->
    <rect x="0" y="50" width="100" height="150" rx="8" fill="#1E293B" stroke="#334155" stroke-dasharray="4 4"/>
    <text x="50" y="130" fill="#475569" font-family="sans-serif" font-size="10" text-anchor="middle">FORGOTTEN</text>
    
    <!-- The Gap -->
    <path d="M100 125H140" stroke="#EF4444" stroke-width="2" stroke-dasharray="4 2"/>

    <!-- Inside the Window -->
    <rect x="140" y="0" width="450" height="250" rx="24" fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-width="3"/>
    <text x="365" y="40" fill="#F59E0B" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">ACTIVE WORKING MEMORY</text>

    <!-- Token Blocks -->
    <g transform="translate(160, 70)">
        <rect x="0" y="0" width="80" height="40" rx="4" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B"/>
        <text x="40" y="25" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">System</text>
        
        <rect x="100" y="0" width="120" height="40" rx="4" fill="#F59E0B" fill-opacity="0.4" stroke="#F59E0B"/>
        <text x="160" y="25" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">User Goal</text>

        <rect x="240" y="0" width="180" height="40" rx="4" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B"/>
        <text x="330" y="25" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">Retrieved Docs</text>

        <rect x="0" y="60" width="420" height="80" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-dasharray="8 4"/>
        <text x="210" y="105" fill="#F59E0B" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LLM REASONING SPACE</text>
    </g>

    <!-- Limit Indicator -->
    <line x1="140" y1="260" x2="590" y2="260" stroke="#F59E0B" stroke-width="2"/>
    <text x="365" y="285" fill="#F59E0B" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">MAX TOKEN CAPACITY (e.g. 128k)</text>
  </g>

  <text x="400" y="380" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">The maximum amount of information a model can "see" at once before it starts forgetting.</text>
</svg>