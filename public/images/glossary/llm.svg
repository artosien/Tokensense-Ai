<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="24" fill="#0F172A"/>
  <text x="40" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="black">LARGE LANGUAGE MODEL (LLM)</text>
  <rect x="40" y="65" width="80" height="4" rx="2" fill="#6366F1"/>

  <!-- Training Data -->
  <g transform="translate(60, 120)">
    <rect width="180" height="150" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="90" y="30" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">MASSIVE DATASET</text>
    <path d="M40 60H140M40 85H140M40 110H100" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="140" fill="#475569" font-family="sans-serif" font-size="8" text-anchor="middle">Petabytes of text &amp; code</text>
  </g>

  <!-- The Model -->
  <g transform="translate(300, 100)">
    <rect width="200" height="200" rx="20" fill="#312E81" fill-opacity="0.2" stroke="#6366F1" stroke-width="2"/>
    <circle cx="100" cy="100" r="60" fill="#6366F1" fill-opacity="0.1" stroke="#6366F1" stroke-width="2" stroke-dasharray="10 5"/>
    <text x="100" y="105" fill="white" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle">TRANSFORMER</text>
    <text x="100" y="180" fill="#818CF8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">BILLIONS OF PARAMETERS</text>
  </g>

  <!-- Output -->
  <g transform="translate(560, 120)">
    <rect width="180" height="150" rx="16" fill="#064E3B" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    <text x="90" y="30" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">CAPABILITIES</text>
    <text x="40" y="65" fill="white" font-family="sans-serif" font-size="10">✓ Reasoning</text>
    <text x="40" y="90" fill="white" font-family="sans-serif" font-size="10">✓ Coding</text>
    <text x="40" y="115" fill="white" font-family="sans-serif" font-size="10">✓ Translation</text>
  </g>

  <!-- Flow -->
  <path d="M245 200H295" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M505 200H555" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <text x="400" y="360" fill="#94A3B8" font-family="sans-serif" font-size="14" text-anchor="middle">Predicting the next token by learning intricate patterns from vast human knowledge.</text>
</svg>